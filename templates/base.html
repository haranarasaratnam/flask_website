<!DOCTYPE html>
<html lang="en">
<head>
    {% block header %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Haran's Website</title>
    <meta property="og:title" content="Haran's Website">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="description" content="Personal website of Haran Arasaratnam featuring research on Cubature Kalman Filtering and notes on Bayesian estimation, control theory, and coding.">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/social.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portfolio.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/resume.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">

    <!-- Highlight.js for fenced code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.5.1/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>

    <!-- MathJax 3 (renders \(...\) and $$...$$) -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    {% endblock %}

</head>

<body class="home">
<header class="masthead">
    <nav class="menu">
        <ul>
            <li><a href="{{url_for('index')}}">Home</a></li>
            <li><a href="{{url_for('portfolio')}}">PhD Work</a></li>
            <li><a href="{{url_for('estimation')}}">Estimation</a></li>
            <li><a href="{{url_for('control')}}">Control</a></li>
            <li><a href="{{url_for('coding')}}">Coding</a></li>
        </ul>
    </nav>
</header>

<article class="main">
    {% block content %}
    {% endblock %}
</article>

<footer>
    <div class="footer_wrapper">
        <div class="footer_message">
            <p>&copy; Haran Arasaratnam 2013 &ndash; 2026. Crafted with &hearts; and &#9749; in California</p>
        </div>
    </div>
</footer>

</body>
</html>
